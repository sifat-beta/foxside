<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxside — The Enterprise AI Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800;900&family=Mulish:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07071A;--bg2:#0D0D24;--bg3:#131332;
  --surface:#10102A;--surface2:#16163A;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#EEF0FF;--text-muted:rgba(238,240,255,0.48);--text-dim:rgba(238,240,255,0.22);
  --accent:#C8FF3C;--accent2:#a8d900;
  --accent-dim:rgba(200,255,60,0.1);--accent-glow:rgba(200,255,60,0.25);
  --r:18px;--r-sm:12px;--r-xs:8px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --c1:#4C8EFF;--c2:#00D49A;--c3:#FFC857;--c4:#FF5C9E;
  --c5:#22DDFF;--c6:#9B71FF;--c7:#FF7142;--c8:#FF4D6D;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden;cursor:none}
a,button,select{cursor:none}

/* ── CURSOR ── */
#cur-dot{position:fixed;width:7px;height:7px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s}
#cur-ring{position:fixed;width:34px;height:34px;border:1.5px solid rgba(200,255,60,0.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .18s var(--ease),height .18s var(--ease),opacity .18s}
body.cursor-active #cur-ring{width:46px;height:46px}

/* ── TYPOGRAPHY ── */
h1,h2,h3,h4,h5{font-family:'Raleway',sans-serif;line-height:1.08}
.syne{font-family:'Raleway',sans-serif}

/* ── LAYOUT ── */
.wrap{max-width:1260px;margin:0 auto;padding:0 40px}

/* ── NAV ── */
#navbar{position:fixed;top:0;left:0;right:0;z-index:800;padding:22px 44px;display:flex;align-items:center;justify-content:space-between;transition:padding .3s var(--ease),background .3s var(--ease),border-color .3s var(--ease);border-bottom:1px solid transparent}
#navbar.stuck{background:rgba(7,7,26,0.88);backdrop-filter:blur(22px);padding:14px 44px;border-bottom-color:var(--border)}
.n-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-family:'Raleway',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.01em}
.n-logo-mark{width:30px;height:30px;background:var(--accent);clip-path:polygon(0 0,68% 0,100% 32%,100% 100%,32% 100%,0 68%);flex-shrink:0}
.n-links{display:flex;align-items:center;gap:4px;list-style:none}
.n-links>li>a,.n-links>li>button{color:var(--text-muted);text-decoration:none;font-size:.92rem;font-weight:500;padding:8px 13px;border-radius:9px;transition:all .2s;background:none;border:none;font-family:'Mulish',sans-serif;white-space:nowrap}
.n-links>li>a:hover,.n-links>li>button:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.n-cta{background:var(--accent)!important;color:#07071A!important;font-weight:700!important;padding:10px 22px!important;border-radius:10px!important;transition:all .2s!important}
.n-cta:hover{background:#d4ff50!important;box-shadow:0 6px 24px rgba(200,255,60,0.3)!important}
/* dropdown */
.n-drop-wrap{position:relative}
.n-dropdown{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(-8px);min-width:320px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:8px;opacity:0;pointer-events:none;transition:all .22s var(--ease);box-shadow:0 24px 60px rgba(0,0,0,0.6)}
.n-drop-wrap:hover .n-dropdown,.n-dropdown:hover{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
.dd-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--text-muted);font-size:.88rem;transition:all .2s}
.dd-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.dd-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dd-info{flex:1}
.dd-name{font-weight:600;font-size:.88rem;color:var(--text)}
.dd-sub{font-size:.76rem;color:var(--text-muted)}

/* ── FOOTER ── */
footer{background:var(--bg2);border-top:1px solid var(--border);padding:80px 0 40px}
.ft-top{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:48px;margin-bottom:56px}
.ft-brand-desc{font-size:.88rem;color:var(--text-muted);margin-top:14px;line-height:1.7;max-width:280px}
.ft-col h5{font-family:'Raleway',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:18px}
.ft-links{list-style:none;display:flex;flex-direction:column;gap:10px}
.ft-links a{color:var(--text-muted);text-decoration:none;font-size:.88rem;transition:color .2s}
.ft-links a:hover{color:var(--text)}
.ft-bottom{padding-top:28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:.8rem;color:var(--text-dim)}
.ft-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid rgba(200,255,60,0.15);padding:4px 12px;border-radius:100px;font-size:.73rem;color:var(--accent)}
.ft-badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── MAIN ── */
main{padding-top:92px}
#app{min-height:60vh}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:'Mulish',sans-serif;border:none;border-radius:12px;transition:all .25s var(--ease);white-space:nowrap;font-weight:600}
.btn-lg{font-size:1rem;padding:15px 30px}
.btn-md{font-size:.92rem;padding:12px 24px}
.btn-sm{font-size:.84rem;padding:9px 18px}
.btn-lime{background:var(--accent);color:#07071A}
.btn-lime:hover{background:#d4ff50;transform:translateY(-2px);box-shadow:0 10px 32px rgba(200,255,60,0.28)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2)}
.btn-outline:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.22)}
.btn-product{background:var(--p-color,var(--accent));color:#07071A}
.btn-product:hover{filter:brightness(1.12);transform:translateY(-2px);box-shadow:0 10px 30px color-mix(in srgb, var(--p-color,var(--accent)) 40%, transparent)}

/* ── SECTION LABEL ── */
.s-label{display:inline-flex;align-items:center;gap:10px;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.s-label::before{content:'';width:22px;height:2px;background:var(--accent)}

/* ── ANIMATIONS ── */
@keyframes fade-up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .65s var(--ease),transform .65s var(--ease)}
.reveal.in{opacity:1;transform:none}
.delay-1{transition-delay:.1s}.delay-2{transition-delay:.18s}.delay-3{transition-delay:.26s}.delay-4{transition-delay:.34s}.delay-5{transition-delay:.42s}

/* ══════════════════════════════════
   HOME PAGE
══════════════════════════════════ */
/* Hero */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:80px 0 60px}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:64px 64px}
.hero-orb1{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(200,255,60,.07) 0%,transparent 70%);top:40%;left:25%;transform:translate(-50%,-50%);animation:float 7s ease-in-out infinite}
.hero-orb2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(76,142,255,.07) 0%,transparent 70%);top:25%;right:10%;animation:float 9s ease-in-out infinite reverse}
.hero-orb3{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(155,113,255,.06) 0%,transparent 70%);bottom:15%;right:30%;animation:float 6s ease-in-out 2s infinite}
.hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1.1fr .9fr;gap:72px;align-items:center;max-width:1260px;margin:0 auto;width:100%;padding:0 40px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:9px;background:rgba(200,255,60,0.08);border:1px solid rgba(200,255,60,0.22);color:var(--accent);font-size:.73rem;font-weight:700;padding:6px 14px;border-radius:100px;margin-bottom:26px;letter-spacing:.1em;text-transform:uppercase;animation:fade-up .6s ease both}
.hero-eyebrow-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.5s infinite}
.hero-h1{font-size:clamp(3.2rem,6.5vw,6.6rem);font-weight:800;letter-spacing:-.034em;line-height:1.0;animation:fade-up .65s .08s ease both}
.hero-h1-line2{display:block;background:linear-gradient(115deg,var(--accent) 0%,#a0e000 60%,#7db800 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-rotating-wrap{display:inline-block;min-height:1em;min-width:180px}
.hero-sub{font-size:1.12rem;color:var(--text-muted);line-height:1.72;max-width:500px;margin:22px 0 38px;animation:fade-up .65s .16s ease both}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;animation:fade-up .65s .24s ease both}
.hero-stats{display:flex;gap:36px;margin-top:50px;padding-top:38px;border-top:1px solid var(--border);animation:fade-up .65s .32s ease both}
.hs-num{font-family:'Raleway',sans-serif;font-size:2rem;font-weight:800;color:var(--text);line-height:1}
.hs-label{font-size:.8rem;color:var(--text-muted);margin-top:4px}
/* Hero visual */
.hero-visual{animation:fade-in .9s .2s ease both;position:relative}
.hv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hv-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;transition:all .3s var(--ease);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.hv-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--p-color,var(--accent));opacity:.65;transition:opacity .3s}
.hv-card:hover{border-color:var(--p-color,var(--accent));transform:translateY(-4px);box-shadow:0 16px 44px rgba(0,0,0,0.4)}
.hv-card:hover::before{opacity:1}
.hv-card:nth-child(1){animation:float 6.5s ease-in-out infinite}
.hv-card:nth-child(2){animation:float 7.5s .8s ease-in-out infinite}
.hv-card:nth-child(3){animation:float 6s 1.6s ease-in-out infinite}
.hv-card:nth-child(4){animation:float 8s .4s ease-in-out infinite}
.hv-card:nth-child(5){animation:float 7s 1.2s ease-in-out infinite}
.hv-card:nth-child(6){animation:float 6.8s 2s ease-in-out infinite}
.hv-card:nth-child(7){animation:float 7.2s .6s ease-in-out infinite}
.hv-card:nth-child(8){animation:float 6.2s 1.8s ease-in-out infinite}
.hv-icon{width:32px;height:32px;border-radius:9px;background:color-mix(in srgb,var(--p-color,var(--accent)) 18%,transparent);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.hv-name{font-family:'Raleway',sans-serif;font-weight:700;font-size:.88rem;line-height:1.2}
.hv-desc{font-size:.72rem;color:var(--text-muted);line-height:1.35}
.hv-price{font-family:'Raleway',sans-serif;font-weight:800;font-size:.82rem;color:var(--p-color,var(--accent));margin-top:auto}

/* Marquee */
.marquee-bar{border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2);padding:16px 0;overflow:hidden}
.marquee-track{display:flex;width:max-content;animation:marquee 28s linear infinite}
.marquee-item{display:flex;align-items:center;gap:14px;padding:0 32px;font-family:'Raleway',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap}
.marquee-item em{color:var(--accent);font-style:normal}
.marquee-sep{color:var(--text-dim)}

/* Suite Section */
.suite-section{padding:130px 0}
.section-header{text-align:center;margin-bottom:68px}
.section-header h2{font-size:clamp(2.2rem,4vw,3.8rem);font-weight:800;letter-spacing:-.025em;margin-bottom:16px}
.section-header p{font-size:1.05rem;color:var(--text-muted);max-width:540px;margin:0 auto;line-height:1.7}
.products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;transition:all .3s var(--ease);position:relative;overflow:hidden;text-decoration:none;color:var(--text);display:block}
.pc::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,color-mix(in srgb,var(--p-color,var(--accent)) 6%,transparent),transparent 55%);opacity:0;transition:opacity .3s}
.pc:hover{border-color:color-mix(in srgb,var(--p-color) 45%,transparent);transform:translateY(-5px);box-shadow:0 22px 60px rgba(0,0,0,0.45)}
.pc:hover::after{opacity:1}
.pc-stripe{height:3px;width:36px;border-radius:2px;background:var(--p-color,var(--accent));margin-bottom:22px;transition:width .35s var(--ease),border-radius .35s}
.pc:hover .pc-stripe{width:100%;border-radius:0;margin:-26px -26px 22px}
.pc-icon{width:46px;height:46px;border-radius:13px;background:color-mix(in srgb,var(--p-color,var(--accent)) 14%,transparent);display:flex;align-items:center;justify-content:center;font-size:1.45rem;margin-bottom:18px}
.pc-name{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.15rem;margin-bottom:4px}
.pc-for{font-size:.72rem;color:var(--p-color,var(--accent));font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.pc-tagline{font-size:.84rem;color:var(--text-muted);line-height:1.52;margin-bottom:22px}
.pc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:18px;border-top:1px solid var(--border)}
.pc-price{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.05rem}
.pc-arrow{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .3s}
.pc:hover .pc-arrow{background:var(--p-color);border-color:transparent;color:#07071A;font-weight:900}

/* Why Section */
.why-section{padding:130px 0;background:var(--bg2)}
.why-inner{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;max-width:1260px;margin:0 auto;padding:0 40px}
.why-left h2{font-size:clamp(2rem,3.5vw,3.2rem);font-weight:800;letter-spacing:-.022em;margin-bottom:20px}
.why-left p{font-size:1.02rem;color:var(--text-muted);line-height:1.75;max-width:460px;margin-bottom:36px}
.why-pills{display:flex;flex-wrap:wrap;gap:10px}
.why-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:8px 16px;font-size:.82rem;font-weight:600}
.why-pill-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.why-features{display:flex;flex-direction:column;gap:16px}
.wf-card{display:flex;gap:18px;align-items:flex-start;padding:22px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;transition:all .3s}
.wf-card:hover{border-color:var(--border2);transform:translateX(4px)}
.wf-icon{width:42px;height:42px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
.wf-card h4{font-family:'Raleway',sans-serif;font-weight:700;font-size:.96rem;margin-bottom:5px}
.wf-card p{font-size:.84rem;color:var(--text-muted);line-height:1.55}

/* Stats */
.stats-section{padding:100px 0}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);max-width:1260px;margin:0 auto;padding:0 40px}
.stat-box{padding:48px 36px;border:1px solid var(--border);text-align:center;transition:background .3s;position:relative}
.stat-box:first-child{border-radius:20px 0 0 20px}
.stat-box:last-child{border-radius:0 20px 20px 0}
.stat-box+.stat-box{border-left:none}
.stat-box:hover{background:var(--surface)}
.stat-n{font-family:'Raleway',sans-serif;font-size:3.4rem;font-weight:800;color:var(--accent);line-height:1;margin-bottom:10px}
.stat-d{font-size:.88rem;color:var(--text-muted);line-height:1.4}

/* Testimonial */
.testimonial-section{padding:100px 0;background:var(--bg2)}
.testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1260px;margin:48px auto 0;padding:0 40px}
.t-card{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:32px;transition:all .3s}
.t-card:hover{border-color:var(--border2);transform:translateY(-3px)}
.t-stars{color:var(--accent);font-size:1rem;margin-bottom:16px;letter-spacing:2px}
.t-quote{font-size:.94rem;color:var(--text-muted);line-height:1.7;margin-bottom:24px;font-style:italic}
.t-quote em{color:var(--text);font-style:normal;font-weight:500}
.t-author{display:flex;align-items:center;gap:12px}
.t-avatar{width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.t-name{font-family:'Raleway',sans-serif;font-weight:700;font-size:.88rem}
.t-role{font-size:.77rem;color:var(--text-muted)}

/* CTA Strip */
.cta-strip{padding:130px 40px;position:relative;overflow:hidden;text-align:center}
.cta-strip-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 100%,rgba(200,255,60,0.07) 0%,transparent 60%);pointer-events:none}
.cta-strip h2{font-size:clamp(2.4rem,5vw,4.5rem);font-weight:800;letter-spacing:-.03em;margin-bottom:20px;max-width:800px;margin-left:auto;margin-right:auto}
.cta-strip p{font-size:1.1rem;color:var(--text-muted);margin-bottom:44px}
.cta-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.cta-disclaimer{font-size:.8rem;color:var(--text-dim);margin-top:20px}

/* ══════════════════════════════════
   ABOUT PAGE
══════════════════════════════════ */
.page-hero{padding:90px 0 80px;background:linear-gradient(to bottom,var(--bg2),var(--bg));position:relative;overflow:hidden}
.page-hero-inner{max-width:1260px;margin:0 auto;padding:0 40px;position:relative;z-index:1}
.page-hero h1{font-size:clamp(2.8rem,5.5vw,5.5rem);font-weight:800;letter-spacing:-.03em;margin:14px 0 20px;max-width:800px}
.page-hero p{font-size:1.1rem;color:var(--text-muted);max-width:580px;line-height:1.72}
.ph-orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(200,255,60,0.05) 0%,transparent 70%);right:-100px;top:-100px;pointer-events:none}

.mission-section{padding:100px 0}
.mission-text{font-size:clamp(1.3rem,2.5vw,2rem);font-weight:500;line-height:1.58;color:var(--text);max-width:900px}
.mission-text em{color:var(--accent);font-style:normal;font-weight:700}

.team-section{padding:80px 0 120px}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:56px}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;overflow:hidden;transition:all .3s}
.team-card:hover{border-color:var(--border2);transform:translateY(-5px)}
.tc-avatar{height:190px;background:linear-gradient(135deg,var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative}
.tc-avatar-ring{position:absolute;bottom:-1px;left:0;right:0;height:80px;background:linear-gradient(to bottom,transparent,var(--surface))}
.tc-body{padding:24px}
.tc-name{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.1rem}
.tc-role{font-size:.78rem;color:var(--accent);font-weight:700;margin:5px 0 14px;text-transform:uppercase;letter-spacing:.06em}
.tc-bio{font-size:.86rem;color:var(--text-muted);line-height:1.6}

.values-section{padding:80px 0 120px;background:var(--bg2)}
.values-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:56px}
.val-card{padding:36px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;transition:all .3s}
.val-card:hover{border-color:var(--accent);background:var(--surface)}
.val-num{font-family:'Raleway',sans-serif;font-size:3.2rem;font-weight:800;color:rgba(200,255,60,0.12);line-height:1;margin-bottom:20px}
.val-card h3{font-size:1.15rem;margin-bottom:12px}
.val-card p{font-size:.86rem;color:var(--text-muted);line-height:1.65}

.timeline-section{padding:100px 0 120px}
.timeline{position:relative;max-width:900px;margin:60px auto 0;padding:0 40px}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border);transform:translateX(-50%)}
.tl-item{display:grid;grid-template-columns:1fr 60px 1fr;margin-bottom:44px;align-items:flex-start}
.tl-item:nth-child(odd) .tl-content{grid-column:1;text-align:right;padding-right:36px}
.tl-item:nth-child(odd) .tl-dot{grid-column:2}
.tl-item:nth-child(odd) .tl-empty{grid-column:3}
.tl-item:nth-child(even) .tl-empty{grid-column:1}
.tl-item:nth-child(even) .tl-dot{grid-column:2}
.tl-item:nth-child(even) .tl-content{grid-column:3;text-align:left;padding-left:36px}
.tl-dot{display:flex;justify-content:center;padding-top:8px}
.tl-dot-inner{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px rgba(200,255,60,0.5)}
.tl-year{font-family:'Raleway',sans-serif;font-weight:800;color:var(--accent);font-size:.75rem;letter-spacing:.12em;margin-bottom:6px}
.tl-title{font-family:'Raleway',sans-serif;font-weight:700;font-size:1.02rem;margin-bottom:6px}
.tl-desc{font-size:.84rem;color:var(--text-muted);line-height:1.55}

/* ══════════════════════════════════
   CONTACT PAGE
══════════════════════════════════ */
.contact-main{padding:60px 0 120px}
.contact-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:72px;max-width:1260px;margin:0 auto;padding:0 40px}
.ci-intro{font-size:.95rem;color:var(--text-muted);line-height:1.75;margin-bottom:36px}
.c-detail{display:flex;align-items:flex-start;gap:14px;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:14px}
.cd-icon{width:38px;height:38px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.cd-label{font-family:'Raleway',sans-serif;font-weight:700;font-size:.8rem;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.cd-value{font-size:.9rem;color:var(--text-muted)}
.contact-form-wrap{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px}
.cf-title{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.5rem;margin-bottom:28px}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.f-group{margin-bottom:16px}
.f-group.full{grid-column:1/-1}
.f-label{font-size:.78rem;font-weight:600;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;display:block}
.f-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 15px;color:var(--text);font-family:'Mulish',sans-serif;font-size:.92rem;outline:none;transition:all .25s;appearance:none;-webkit-appearance:none}
.f-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,60,0.08)}
.f-input::placeholder{color:var(--text-dim)}
textarea.f-input{resize:vertical;min-height:130px}
.f-submit{width:100%;margin-top:8px;justify-content:center;font-size:1rem;padding:16px}

/* ══════════════════════════════════
   PRODUCT PAGE
══════════════════════════════════ */
.prod-hero{padding:90px 40px 80px;min-height:72vh;display:flex;align-items:center;position:relative;overflow:hidden}
.prod-hero-bg{position:absolute;inset:0}
.prod-hero-orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--p-color,var(--accent)) 9%,transparent) 0%,transparent 70%);right:-50px;top:50%;transform:translateY(-50%);pointer-events:none}
.prod-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:56px 56px}
.prod-hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;max-width:1260px;margin:0 auto;width:100%}
.prod-badge{display:inline-flex;align-items:center;gap:8px;background:color-mix(in srgb,var(--p-color) 10%,transparent);border:1px solid color-mix(in srgb,var(--p-color) 28%,transparent);color:var(--p-color);font-size:.72rem;font-weight:700;padding:5px 13px;border-radius:100px;margin-bottom:20px;letter-spacing:.1em;text-transform:uppercase}
.prod-hero-inner h1{font-size:clamp(2.8rem,5.5vw,5rem);font-weight:800;letter-spacing:-.032em;margin-bottom:14px}
.prod-hero-inner .prod-tagline{font-size:1.12rem;color:var(--text-muted);line-height:1.72;max-width:470px;margin-bottom:32px}
.prod-hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:36px}
.prod-price-tag{display:inline-flex;align-items:baseline;gap:4px}
.prod-price-tag .price-num{font-family:'Raleway',sans-serif;font-weight:800;font-size:2.4rem;color:var(--p-color)}
.prod-price-tag .price-per{font-size:.88rem;color:var(--text-muted)}
/* Mock dashboard */
.prod-dashboard{background:var(--surface);border:1px solid var(--border);border-radius:22px;overflow:hidden;aspect-ratio:4/3;position:relative}
.db-topbar{display:flex;align-items:center;gap:6px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg2)}
.db-dot{width:9px;height:9px;border-radius:50%}
.db-tab{height:22px;border-radius:5px;background:var(--surface2);flex:0 0 70px}
.db-tab.active{background:color-mix(in srgb,var(--p-color) 20%,transparent);border:1px solid color-mix(in srgb,var(--p-color) 30%,transparent)}
.db-body{display:grid;grid-template-columns:56px 1fr;height:calc(100% - 45px)}
.db-sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:8px}
.db-si{width:36px;height:30px;border-radius:6px;background:var(--surface2)}
.db-si.active{background:color-mix(in srgb,var(--p-color) 22%,transparent)}
.db-main{padding:14px;display:flex;flex-direction:column;gap:10px;overflow:hidden}
.db-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.db-kpi{background:var(--bg2);border-radius:8px;padding:10px;border:1px solid var(--border)}
.db-kpi.highlight{background:color-mix(in srgb,var(--p-color) 12%,transparent);border-color:color-mix(in srgb,var(--p-color) 28%,transparent)}
.db-kpi-num{font-family:'Raleway',sans-serif;font-size:1rem;font-weight:800;color:var(--p-color);margin-bottom:2px}
.db-kpi-label{font-size:.55rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.db-chart-area{background:var(--bg2);border-radius:8px;border:1px solid var(--border);flex:1;position:relative;overflow:hidden;padding:8px}
.db-chart-title{font-size:.6rem;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.db-bars{display:flex;align-items:flex-end;gap:4px;height:calc(100% - 22px)}
.db-bar{flex:1;border-radius:3px 3px 0 0;background:color-mix(in srgb,var(--p-color) 28%,transparent);border-top:2px solid var(--p-color);min-height:6px;position:relative}
.db-list{background:var(--bg2);border-radius:8px;border:1px solid var(--border);padding:8px}
.db-row{height:22px;background:var(--surface2);border-radius:4px;margin-bottom:5px}
.db-row.em{background:color-mix(in srgb,var(--p-color) 10%,transparent)}

/* Features section */
.features-section{padding:110px 0}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:56px;max-width:1260px;margin-left:auto;margin-right:auto;padding:0 40px}
.feat-card{padding:34px;background:var(--surface);border:1px solid var(--border);border-radius:20px;transition:all .3s;position:relative;overflow:hidden}
.feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--p-color,var(--accent)),transparent);opacity:0;transition:opacity .3s}
.feat-card:hover::before{opacity:1}
.feat-card:hover{border-color:var(--border2);transform:translateY(-3px)}
.feat-icon{font-size:1.9rem;margin-bottom:18px}
.feat-card h3{font-family:'Raleway',sans-serif;font-weight:700;font-size:1.06rem;margin-bottom:10px}
.feat-card p{font-size:.86rem;color:var(--text-muted);line-height:1.65}

/* Who it's for */
.for-section{padding:80px 0 110px;background:var(--bg2)}
.for-inner{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;max-width:1260px;margin:0 auto;padding:0 40px}
.for-list{display:flex;flex-direction:column;gap:14px;margin-top:32px}
.for-item{display:flex;align-items:flex-start;gap:14px;padding:20px;background:var(--bg3);border:1px solid var(--border);border-radius:14px}
.for-check{width:28px;height:28px;border-radius:8px;background:color-mix(in srgb,var(--p-color,var(--accent)) 18%,transparent);display:flex;align-items:center;justify-content:center;color:var(--p-color);font-weight:700;font-size:.85rem;flex-shrink:0}
.for-item strong{font-family:'Raleway',sans-serif;font-size:.95rem;display:block;margin-bottom:4px}
.for-item span{font-size:.83rem;color:var(--text-muted)}
/* Pricing card */
.pricing-section{padding:100px 0 120px}
.pricing-card{max-width:540px;margin:56px auto 0;background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:48px;text-align:center;position:relative;overflow:hidden}
.pricing-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p-color),color-mix(in srgb,var(--p-color) 50%,white 50%))}
.pricing-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -20%,color-mix(in srgb,var(--p-color) 8%,transparent),transparent 60%);pointer-events:none}
.pricing-label{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.pricing-name{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:24px}
.pricing-amount{font-family:'Raleway',sans-serif;font-size:4.5rem;font-weight:800;line-height:1;color:var(--text);margin-bottom:6px}
.pricing-amount sup{font-size:2rem;vertical-align:super;color:var(--p-color)}
.pricing-cycle{font-size:.88rem;color:var(--text-muted);margin-bottom:34px}
.pricing-divider{height:1px;background:var(--border);margin:0 -48px 28px}
.pricing-features-list{list-style:none;text-align:left;margin-bottom:36px}
.pricing-features-list li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.9rem}
.pricing-features-list li::before{content:'✓';color:var(--p-color);font-weight:800;flex-shrink:0;margin-top:1px}
.pricing-cta{width:100%;justify-content:center;font-size:1.05rem;padding:16px}
.pricing-note{font-size:.78rem;color:var(--text-dim);margin-top:14px}

/* ══════════════════════════════════
   DEMO DASHBOARDS
══════════════════════════════════ */
.demo-page{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.demo-banner{background:linear-gradient(90deg,color-mix(in srgb,var(--p-color,var(--accent)) 15%,transparent),color-mix(in srgb,var(--p-color,var(--accent)) 8%,transparent));border-bottom:1px solid color-mix(in srgb,var(--p-color,var(--accent)) 25%,transparent);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.demo-banner-left{display:flex;align-items:center;gap:10px;font-size:.82rem;font-weight:700}
.demo-tag{background:color-mix(in srgb,var(--p-color,var(--accent)) 20%,transparent);border:1px solid color-mix(in srgb,var(--p-color,var(--accent)) 40%,transparent);color:var(--p-color,var(--accent));padding:3px 10px;border-radius:100px;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase}
.demo-banner-right{display:flex;gap:8px;align-items:center}
.demo-shell{display:flex;flex:1;height:calc(100vh - 44px - 92px);overflow:hidden}
.demo-sidebar{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.ds-logo{padding:18px 16px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.ds-logo-icon{width:28px;height:28px;border-radius:8px;background:color-mix(in srgb,var(--p-color,var(--accent)) 20%,transparent);display:flex;align-items:center;justify-content:center;font-size:.95rem}
.ds-logo-name{font-family:'Raleway',sans-serif;font-weight:800;font-size:.92rem;color:var(--p-color,var(--accent))}
.ds-nav{padding:10px 8px;flex:1}
.ds-section{font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);padding:10px 8px 6px;margin-top:6px}
.ds-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:.82rem;color:var(--text-muted);cursor:none;transition:all .18s;margin-bottom:2px;font-weight:500}
.ds-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.ds-item.active{background:color-mix(in srgb,var(--p-color,var(--accent)) 14%,transparent);color:var(--p-color,var(--accent));font-weight:700}
.ds-item-icon{font-size:.95rem;flex-shrink:0;width:18px;text-align:center}
.ds-badge{margin-left:auto;background:var(--p-color,var(--accent));color:#07071A;font-size:.6rem;font-weight:800;padding:1px 6px;border-radius:100px}
.ds-avatar{padding:14px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.ds-av-circle{width:30px;height:30px;border-radius:50%;background:color-mix(in srgb,var(--p-color,var(--accent)) 22%,transparent);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.ds-av-name{font-size:.78rem;font-weight:700;line-height:1.2}
.ds-av-role{font-size:.65rem;color:var(--text-muted)}
.demo-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.demo-topbar{padding:12px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.dt-title{font-family:'Raleway',sans-serif;font-weight:800;font-size:1rem}
.dt-right{display:flex;align-items:center;gap:8px}
.dt-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-size:.76rem;padding:6px 12px;border-radius:8px;cursor:none;font-family:'Mulish',sans-serif;font-weight:600;transition:all .2s}
.dt-btn:hover{background:var(--surface);color:var(--text)}
.dt-btn.primary{background:color-mix(in srgb,var(--p-color,var(--accent)) 18%,transparent);border-color:color-mix(in srgb,var(--p-color,var(--accent)) 35%,transparent);color:var(--p-color,var(--accent))}
.demo-content{flex:1;overflow-y:auto;padding:20px 22px}
/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s}
.kpi-card:hover{border-color:var(--border2)}
.kpi-card.highlight{border-color:color-mix(in srgb,var(--p-color,var(--accent)) 35%,transparent);background:color-mix(in srgb,var(--p-color,var(--accent)) 6%,transparent)}
.kpi-label{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
.kpi-value{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.7rem;line-height:1;color:var(--text);margin-bottom:6px}
.kpi-card.highlight .kpi-value{color:var(--p-color,var(--accent))}
.kpi-delta{font-size:.72rem;font-weight:700}
.kpi-delta.up{color:#00D49A}.kpi-delta.down{color:#FF5C9E}.kpi-delta.neutral{color:var(--text-muted)}
/* Grid areas */
.demo-grid{display:grid;gap:14px}
.demo-grid-2{grid-template-columns:1.4fr 1fr}
.demo-grid-3{grid-template-columns:2fr 1fr 1fr}
.demo-grid-full{grid-template-columns:1fr}
.d-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.d-panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.d-panel-title{font-family:'Raleway',sans-serif;font-weight:700;font-size:.88rem}
.d-panel-sub{font-size:.72rem;color:var(--text-muted)}
.d-panel-body{padding:16px 18px}
/* Charts */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:8px}
.bc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bc-bar{width:100%;border-radius:4px 4px 0 0;background:color-mix(in srgb,var(--p-color,var(--accent)) 28%,transparent);border-top:2px solid var(--p-color,var(--accent));min-height:4px;transition:height .4s ease}
.bc-bar.highlight{background:color-mix(in srgb,var(--p-color,var(--accent)) 55%,transparent)}
.bc-label{font-size:.6rem;color:var(--text-dim);text-align:center}
/* Progress bars */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.prog-label{font-size:.75rem;color:var(--text-muted);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--p-color,var(--accent));transition:width .6s ease}
.prog-val{font-size:.72rem;font-weight:700;color:var(--text-muted);width:36px;text-align:right;flex-shrink:0}
/* Table */
.d-table{width:100%;border-collapse:collapse;font-size:.78rem}
.d-table th{text-align:left;padding:8px 12px;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border)}
.d-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text-muted);vertical-align:middle}
.d-table tr:last-child td{border-bottom:none}
.d-table tr:hover td{background:rgba(255,255,255,0.02);color:var(--text)}
.d-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:.65rem;font-weight:700;white-space:nowrap}
.d-tag.green{background:rgba(0,212,154,0.12);color:#00D49A;border:1px solid rgba(0,212,154,0.25)}
.d-tag.yellow{background:rgba(255,200,87,0.12);color:#FFC857;border:1px solid rgba(255,200,87,0.25)}
.d-tag.red{background:rgba(255,92,158,0.12);color:#FF5C9E;border:1px solid rgba(255,92,158,0.25)}
.d-tag.blue{background:rgba(76,142,255,0.12);color:#4C8EFF;border:1px solid rgba(76,142,255,0.25)}
.d-tag.purple{background:rgba(155,113,255,0.12);color:#9B71FF;border:1px solid rgba(155,113,255,0.25)}
.d-tag.cyan{background:rgba(34,221,255,0.12);color:#22DDFF;border:1px solid rgba(34,221,255,0.25)}
.d-tag.p{background:color-mix(in srgb,var(--p-color,var(--accent)) 12%,transparent);color:var(--p-color,var(--accent));border:1px solid color-mix(in srgb,var(--p-color,var(--accent)) 28%,transparent)}
/* Score ring */
.score-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Raleway',sans-serif;font-weight:800;font-size:1.1rem;color:var(--text)}
/* Activity feed */
.activity-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.activity-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;background:var(--p-color,var(--accent));flex-shrink:0;margin-top:5px}

function initReveal(){
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')})},{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

const WORDS=['Law Firms','Real Estate Agents','Educators','Sales Teams','Healthcare Providers','Financial Advisors','HR Managers','Construction Firms'];
let wordIdx=0,charIdx=0,deleting=false;
function typeStep(){
  const el=document.getElementById('hero-type');if(!el)return;
  const w=WORDS[wordIdx];
  if(!deleting){el.textContent=w.slice(0,++charIdx);if(charIdx===w.length){deleting=true;setTimeout(typeStep,2200);return}}
  else{el.textContent=w.slice(0,--charIdx);if(charIdx===0){deleting=false;wordIdx=(wordIdx+1)%WORDS.length;setTimeout(typeStep,400);return}}
  setTimeout(typeStep,deleting?55:90);
}

async function handleSubmit(){
  const btn = document.getElementById('cf-submit');
  const errBox = document.getElementById('cf-error');
  const fname = document.getElementById('cf-fname')?.value.trim();
  const lname = document.getElementById('cf-lname')?.value.trim();
  const email = document.getElementById('cf-email')?.value.trim();
  const company = document.getElementById('cf-company')?.value.trim();
  const product = document.getElementById('cf-product')?.value;
  const size = document.getElementById('cf-size')?.value;
  const message = document.getElementById('cf-message')?.value.trim();

  if(!fname||!lname||!email||!company){
    errBox.textContent = 'Please fill in your name, email, and company name.';
    errBox.style.display='block';
    return;
  }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    errBox.textContent = 'Please enter a valid work email address.';
    errBox.style.display='block';
    return;
  }
  errBox.style.display='none';
  btn.textContent = 'Sending…';
  btn.disabled = true;
  btn.style.opacity='.7';

  // ── Replace 8621ea29-acb7-42b8-8ee5-6e9fc40cb8b6 with your key from web3forms.com ──
  const WEB3FORMS_KEY = '8621ea29-acb7-42b8-8ee5-6e9fc40cb8b6';

  const payload = {
    access_key: WEB3FORMS_KEY,
    subject: `Demo Request — ${product||'Foxside'} from ${company}`,
    from_name: 'Foxside Website',
    name: `${fname} ${lname}`,
    email: email,
    company: company,
    product_interest: product||'Not specified',
    team_size: size||'Not specified',
    message: message||'No message provided'
  };

  try {
    const res = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(json.success){
      document.getElementById('contact-form-fields').style.display='none';
      btn.style.display='none';
      document.querySelector('[style*="1 business day"]').style.display='none';
      const wrap = document.querySelector('.contact-form-wrap');
      const success = document.createElement('div');
      success.style.cssText='text-align:center;padding:40px 0';
      success.innerHTML=`<div style="font-size:3rem;margin-bottom:20px">✅</div><h3 style="font-family:Raleway,sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:12px">Request Received!</h3><p style="font-size:.95rem;color:var(--text-muted);line-height:1.7">Thanks, ${fname}. We'll be in touch within one business day to schedule your <strong>${product||'Foxside'}</strong> demo.<br><br>Keep an eye on <strong>${email}</strong>.</p>`;
      wrap.appendChild(success);
    } else {
      throw new Error(json.message||'Submission failed');
    }
  } catch(e){
    btn.textContent = 'Request Demo →';
    btn.disabled=false;
    btn.style.opacity='1';
    errBox.textContent = 'Something went wrong sending your request. Please email us directly at info@foxside.com';
    errBox.style.display='block';
  }
}

// Global panel store - keyed by "productid_panelid"
window.DEMO_PANELS = {};

window.dsDemoNav = function(el) {
  // Update sidebar active state
  document.querySelectorAll('.ds-item').forEach(function(i){ i.classList.remove('active'); });

  var prodId  = el.getAttribute('data-prod');
  var key     = prodId + '_' + panelId;

  if (!html) return;
  var content = document.querySelector('.demo-content');
  var topbar  = document.querySelector('.dt-title');
  if (content) {
    content.style.opacity = '0';

    setTimeout(function(){
      content.innerHTML = html;
      content.style.transition = 'opacity .22s ease, transform .22s ease';
      content.style.opacity = '1';
      content.style.transform = 'none';

};

function lineSVG(pts, color) {
  var w=300,h=90,pad=6;
  var xs=pts.map(function(_,i){return pad+i*(w-2*pad)/(pts.length-1);});
  var mn=Math.min.apply(null,pts), mx=Math.max.apply(null,pts);
  var ys=pts.map(function(v){return h-pad-(v-mn)/(mx-mn||1)*(h-2*pad);});
  var path='M'+xs.map(function(x,i){return x+','+ys[i];}).join('L');
  var area='M'+xs[0]+','+h+'L'+xs.map(function(x,i){return x+','+ys[i];}).join('L')+'L'+xs[xs.length-1]+','+h+'Z';
  var id='lg'+color.replace('#','');
  return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:100%">'
    +'<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+color+'" stop-opacity=".3"/>'
    +'<stop offset="100%" stop-color="'+color+'" stop-opacity="0"/>'
    +'</linearGradient></defs>'
    +'<path d="'+area+'" fill="url(#'+id+')" />'
    +'<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/>'
    +xs.map(function(x,i){return '<circle cx="'+x+'" cy="'+ys[i]+'" r="2.5" fill="'+color+'"/>';}).join('')
    +'</svg>';
}

function scoreRing(val,max,color,size) {
  size = size||72;
  var r=26, circ=2*Math.PI*r, dash=(val/max)*circ;
  return '<div class="score-ring" style="width:'+size+'px;height:'+size+'px">'
    +'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="transform:rotate(-90deg)">'
    +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>'
    +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="5" stroke-dasharray="'+dash+' '+circ+'" stroke-linecap="round"/>'
    +'</svg><div class="score-ring-val">'+val+'</div></div>';
}

function progRow(label,pct,colorOverride) {

function nav(route){
  history.pushState(null,'','#'+route);
  route$();
}
window.nav = nav;

function route$(){
  const h = (location.hash||'#home').replace('#','');
  const parts = h.split('/');
  let html='';
  if(parts[0]==='product'&&parts[1]){
    const p = PRODUCTS.find(x=>x.id===parts[1]);
    if(p) html = renderProduct(p);
    else html = renderHome();
  } else if(parts[0]==='demo'&&parts[1]) html = renderDemoPage(parts[1]);
  else if(parts[0]==='about') html = renderAbout();
  else if(parts[0]==='contact') html = renderContact();
  else if(parts[0]==='privacy') html = renderPrivacy();
  else if(parts[0]==='refund') html = renderRefund();
  else if(parts[0]==='case-studies') html = renderCaseStudies();
  else if(parts[0]==='case'&&parts[1]) html = renderCaseStudy(parts[1]);
  else html = renderHome();

  const app = document.getElementById('app');
  // Demo pages get full-height treatment
  if(parts[0]==='demo') {
    app.style.transition='none';
    app.style.opacity='1';
    app.style.transform='none';
    app.innerHTML = html;
    window.scrollTo({top:0,behavior:'instant'});
    initReveal();
    return;
  }
  app.style.transform='translateY(12px)';
  setTimeout(()=>{
    app.innerHTML = html;
    app.style.transition='opacity .35s ease,transform .35s ease';
    app.style.opacity='1';
    app.style.transform='translateY(0)';
    window.scrollTo({top:0,behavior:'instant'});
    initReveal();
    if(location.hash==='#home'||location.hash===''||location.hash==='#') {
      setTimeout(typeStep, 400);
    }
  },160);
}

window.addEventListener('popstate', route$);
window.addEventListener('DOMContentLoaded', ()=>{
  route$();
  // intercept all hash links in app
  document.getElementById('app').addEventListener('click', e=>{
    const a = e.target.closest('a[href^="#"]');
    if(a&&!a.hasAttribute('onclick')){
      e.preventDefault();
      const r = a.getAttribute('href').replace('#','');
      nav(r);
    }
  });
});
</script>
</body>
</html>
`;
